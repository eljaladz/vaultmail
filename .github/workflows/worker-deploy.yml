name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/worker-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Deploy worker
        working-directory: worker
        env:
          WRANGLER_DISABLE_UPDATE_CHECK: "true"
        run: >-
          npx wrangler@4 deploy
          --var "WEBHOOK_URL:${{ secrets.WEBHOOK_URL }}"
          --var "FORWARD_DOMAINS:${{ secrets.FORWARD_DOMAINS }}"
          --var "FORWARD_EMAIL:${{ secrets.FORWARD_EMAIL }}"

      - name: Set WEBHOOK_SECRET
        working-directory: worker
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: printf "%s" "$WEBHOOK_SECRET" | npx wrangler@4 secret put WEBHOOK_SECRET
